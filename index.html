}

}

}

  return list[seed%list.length];
}

function todayISO(){
  const d=new Date();
  const m=String(d.getMonth()+1).padStart(2,'0');
  const day=String(d.getDate()).padStart(2,'0');
  return `${d.getFullYear()}-${m}-${day}`;
}
function daysBetween(dateISO){
  const a=new Date(todayISO()+"T00:00:00");
  const b=new Date(dateISO+"T00:00:00");
  return Math.ceil((b-a)/(1000*60*60*24));
}
function formatEventDate(dateISO){
  const diff=daysBetween(dateISO);
  if(diff===0)return "Hari ini";
  if(diff===1)return "Besok";
  if(diff>1)return `${diff} hari lagi`;
  if(diff===-1)return "Kemarin";
  return `${Math.abs(diff)} hari lalu`;
}
function eventTypeLabel(t){
  return t==='bill'?'Tagihan':t==='goal'?'Goal Review':'Acara';
}
function eventDot(t){
  return `<span class="dot ${t==='bill'?'bill':t==='goal'?'goal':'event'}"></span>`;
}
function upcomingEvents(limit=4){
  return [...events]
    .filter(e=>daysBetween(e.date)>=0)
    .sort((a,b)=>a.date.localeCompare(b.date))
    .slice(0,limit);
}
function smartReminders(){
  const list=[];
  const learningMinutes=goals.reduce((a,g)=>a+(g.logs||[]).reduce((x,l)=>x+l.duration,0),0);
  if(learningMinutes===0) list.push({type:'goal',title:'Mulai learning log pertama',note:'Setiap menit belajar akan membangun versi dirimu di masa depan.',date:todayISO()});
  const emergency=pockets.find(p=>p.id==='p_emergency');
  if(emergency && emergency.current/emergency.target<0.5) list.push({type:'goal',title:'Dana Darurat belum 50%',note:'Fondasi keamanan finansial masih perlu diperkuat.',date:todayISO()});
  return list.slice(0,2);
}

function calendarHub(year=new Date().getFullYear(), month=new Date().getMonth()){
  const monthName=new Intl.DateTimeFormat('id-ID',{month:'long',year:'numeric'}).format(new Date(year,month,1));
  const first=new Date(year,month,1);
  const last=new Date(year,month+1,0).getDate();
  const start=(first.getDay()+6)%7;
  const names=['Sen','Sel','Rab','Kam','Jum','Sab','Min'];
  let cells=names.map(n=>`<div class="day-name">${n}</div>`).join('');
  for(let i=0;i<start;i++) cells+=`<div class="day-cell muted"></div>`;
  for(let d=1;d<=last;d++){
    const iso=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const ev=events.filter(e=>e.date===iso);
    const isToday=iso===todayISO();
    cells+=`<div class="day-cell ${ev.length?'has-event':''} ${isToday?'today':''}" onclick="dayDetail('${iso}')"><span>${d}</span><div class="dots">${ev.slice(0,3).map(e=>eventDot(e.type)).join('')}</div></div>`;
  }
  openSheet(`<div class="section" style="margin-top:0"><h2>Calendar</h2><span onclick="closeModal()" class="chip">×</span></div>
  <div class="row"><button class="chip" onclick="calendarHub(${month===0?year-1:year},${month===0?11:month-1})">‹</button><b>${monthName}</b><button class="chip" onclick="calendarHub(${month===11?year+1:year},${month===11?0:month+1})">›</button></div>
  <div class="calendar-grid">${cells}</div>
  <br><button class="btn" onclick="formEvent()">Tambah Reminder</button>
  <br><br><button class="btn alt" onclick="requestNotificationPermission()">Aktifkan Notifikasi Browser</button>
  <p class="subtle">Catatan: notifikasi browser bergantung izin perangkat/browser. Untuk APK nanti bisa dibuat local notification native.</p>`);
}
function dayDetail(dateISO){
  const ev=events.filter(e=>e.date===dateISO).sort((a,b)=>(a.time||'').localeCompare(b.time||''));
  const content=ev.length?ev.map(e=>`<div class="row clickable" onclick="eventDetail('${e.id}')"><div class="left"><div class="icon">${iconNote()}</div><div><b>${e.title}</b><small>${e.time||'Tanpa jam'} • ${eventTypeLabel(e.type)} ${e.amount?`• ${fmt(e.amount)}`:''}</small></div></div><b>›</b></div>`).join(''):`<div class="empty-state"><h3>Belum ada agenda.</h3><p>Tanggal ini masih kosong. Tambahkan agenda jika ada sesuatu yang ingin kamu jaga.</p></div>`;
  openSheet(`<div class="section" style="margin-top:0"><h2>${new Intl.DateTimeFormat('id-ID',{dateStyle:'full'}).format(new Date(dateISO+'T00:00:00'))}</h2><span onclick="closeModal()" class="chip">×</span></div>${content}<button class="btn" onclick="formEvent(null,'${dateISO}')">Tambah Agenda</button>`);
}

function requestNotificationPermission(){
  if(!('Notification' in window)) return alert('Browser ini belum mendukung Notification API.');
  Notification.requestPermission().then(p=>{
    if(p==='granted'){
      new Notification('Dunia Raya OS', {body:'Notifikasi aktif. Reminder akan ditampilkan saat aplikasi dibuka.'});
    }else alert('Izin notifikasi belum diberikan.');
  });
}
function checkDueNotifications(){
  if(!('Notification' in window) || Notification.permission!=='granted') return;
  const key='notified_'+todayISO();
  if(localStorage.getItem(key)) return;
  const due=events.filter(e=>daysBetween(e.date)===0 || daysBetween(e.date)===Number(e.remind||999));
  if(due.length){
    new Notification('Dunia Raya OS', {body:`Ada ${due.length} reminder penting. Buka aplikasi untuk melihat detail.`});
    localStorage.setItem(key,'1');
  }
}


function importBackup(){
 const input=document.createElement('input');
 input.type='file';
 input.accept='.json,application/json';
 input.onchange=(e)=>{
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=()=>{
   try{
    const data=JSON.parse(reader.result);
    if(!confirm('Import backup? Data saat ini akan ditimpa.')) return;
    Object.keys(data).forEach(k=>localStorage.setItem(k, JSON.stringify(data[k])));
    alert('Backup berhasil dipulihkan.');
    location.reload();
   }catch(err){alert('File backup tidak valid');}
  };
  reader.readAsText(file);
 };
 input.click();
}

function progressMarkup(value,label='Progress'){
  const v=Math.max(0,Math.min(100,Math.round(Number(value||0))));

}
